openapi: 3.0.3
info:
    title: SPECIFICATION
    description: This is a specification of ingredient implementation
    version: "1.0.0"
servers:
  - url: http://localhost:8080

paths:
  /ingredients:
    get:
      description: Return a json list content ingredients attributs
      responses:
        '200':
          description: A list of ingredients
          content:
            application/json
  /ingredients/{id}:
    get:
      summary: Return one ingredient properties
      parameters:
        -in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Ingredient found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ingredient"
  /dishes:
    get:
      summary: get a list of dishes
      responses:
        '200':
          description: list of dishes
          content:
            application/json
  /ingredients/{id}/stock:
    get:
      summary: get stock of ingredient on given time and unit
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: at
          required: false
          description: Instant to see the stock movement
        - in: query
          name: unit
          required: false
          description: The unit of stock value
      responses:
        '200':
          description: StockMovement for this ingredient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMovement"
  /dishes/{id}/ingredients:
    put:
      summary: Replace all ingredients of a dish
      description: Attach and detach ingredients in dish (full replacement)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Dish ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/DishIngredient"
            examples:
              valid:
                summary: Example with two ingredients
                value: [
                  { "ingredient": { "id": 1 }, "quantity_required": 250, "unit_type": "KG" },
                  { "ingredient": { "id": 2 }, "quantity_required": 0.5, "unit_type": "L" }
                ]
      responses:
        "200":
          description: Dish ingredients updated successfully
        "400":
          description: Bad request - empty ingredients list
        "404":
          description: Dish not found












components:
  schemas:
    Ingredient:
      type: object
      properties:
        id:
          type: integer
          example: 5
      required:
          - id
    StockMovement:
      type: object
      properties:
        at:
          type: string
        unit:
          type: string
          enum:
            - KG
            - L
            - PCS
        id:
          type: integer
          example: 1
    DishIngredient:
      type: object
      properties:
          id:
            type: integer
            readOnly: true
          dish:
            type: object
            properties:
              id:
                type: integer
          ingredient:
            type: object
            required:
              - id
            properties:
              id:
                type: integer
          quantity_required:
            type: number
            format: double
            minimum: 0
          unit_type:
            type: string
            enum: [KG,L,PCS]












