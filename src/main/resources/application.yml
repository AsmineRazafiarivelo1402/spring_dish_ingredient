openapi: 3.0.3
info:
    title: SPECIFICATION
    description: This is a specification of ingredient implementation
    version: "1.0.0"
servers:
  - url: http://localhost:8080

paths:
  /ingredients:
    get:
      description: Return a json list content ingredients attributs
      responses:
        '200':
          description: A list of ingredients
          content:
            application/json
  /ingredients/{id}:
    get:
      summary: Return one ingredient properties
      parameters:
        -in: path
        name: id
        required: true
        schema:
          type: string

      responses:
        '200':
          description: Ingredient found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ingredient"
  /dishes:
    get:
      summary: get a list of dishes
      responses:
        '200':
          description: list of dishes
          content:
            application/json
  /ingredients/{id}/stockMovement:
    get:
      summary: get stcok of ingredient on given time and unit
      parameters:
        requestParam



components:
  schemas:
    Ingredient:
      type: object
      properties:
        id:
          type: integer
          example: 5
      required:
          - id

















